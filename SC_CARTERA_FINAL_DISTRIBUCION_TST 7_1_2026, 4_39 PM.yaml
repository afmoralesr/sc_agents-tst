name: SC_CARTERA_FINAL_DISTRIBUCION_TST
tables:
  - name: SC_CARTERA_FINAL_DISTRIBUCION
    synonyms:
      - Cartera
      - Cartera Morosos
    description: |
      La tabla contiene datos referente a clientes que se encuentran en un proceso de cobranza referente a su ciclo facturación, es decir son clientes deudores , se contempla una promoción para cada cliente. 

      Cada registro representa un cliente en la cartera morosos, se contemplan clientes de 1 a 90 días de mora, incluyendo detalles sobre los métodos de pago, las fechas de vencimiento, los niveles de riesgo, el valor de saldos vencido y por vencer, incluidos los días de mora y los datos de contacto del cliente. 

      Un cliente puede tener varios registros ya que tienen asociado una distribución diferente.
    base_table:
      database: SC_TST
      schema: SC
      table: SC_CARTERA_FINAL_DISTRIBUCION
    dimensions:
      - name: BLACKLIST
        synonyms:
          - Lista de exclusión
          - Lista negra
        description: Indicador que indica si el cliente pertenece a lista negra
        expr: BLACKLIST
        data_type: VARCHAR(2)
        sample_values:
          - SI
          - 'NO'
      - name: CICLO
        synonyms:
          - Ciclo Facturación
          - Dia de Ciclo
        description: Numero del día de mes en que el cliente empieza y termina su facturación.
        expr: CICLO
        data_type: NUMBER(38,0)
        sample_values:
          - '21'
          - '27'
          - '2'
      - name: CLIENTE
        synonyms:
          - ID Cliente
          - Numero de Cuenta
          - Numero de Suscriptor
        description: Numero de cliente asociada al cliente
        expr: CLIENTE
        data_type: VARCHAR(100)
        sample_values:
          - '46884203'
          - '51214437'
          - '45007783'
      - name: CODIGO_POSTAL
        synonyms:
          - CP
        description: Código Postal asociada a la dirección del cliente.
        expr: CODIGO_POSTAL
        data_type: VARCHAR(30)
        sample_values:
          - '67483'
          - '96580'
          - '38036'
      - name: COLONIA
        synonyms:
          - Barrio
          - Vecindario
        description: Colonia asociada a la dirección cliente.
        expr: COLONIA
        data_type: VARCHAR(350)
        sample_values:
          - EJIDO OJO DE AGUA
          - ALTA VISTA
          - LAZARO CARDENAS 2O SECTOR
      - name: CORREO
        synonyms:
          - Correo Electrónico
          - Dirección Electrónica
          - Email
          - Mail
        description: Dirección de correo electrónico asociada al cliente.
        expr: CORREO
        data_type: VARCHAR(350)
        sample_values:
          - guzmanvazquezguillermo2@gmail.com
          - sonnita712@gmail.com
          - jorgealvi67@gmail.com
      - name: DESCRIPCION_DE_EQUIPOS
        synonyms:
          - Detalle Equipos
          - Especificaciones Equipos
        description: Detalle técnico o comercial de los dispositivos.
        expr: DESCRIPCION_DE_EQUIPOS
        data_type: VARCHAR(16777216)
        sample_values:
          - EMTA Sagemcom Fast 3890 DOCSIS 3.1
          - MTA ARRIS TG2482 DOCSIS 3.0
          - Arris - TG3442ANA | ZTE model B866V2FI
      - name: DIA_VENCIMIENTO
        synonyms:
          - Dia fin
          - Dia pago
          - Fecha limite de pago
        description: Dia de mes donde el cliente tiene la obligación de realizar el pago.
        expr: DIA_VENCIMIENTO
        data_type: NUMBER(38,0)
        sample_values:
          - '12'
          - '6'
          - '1'
      - name: DISTRIBUCION
        synonyms:
          - Distribución
          - Distribución Clientes
          - Gestión
        description: Canal responsable por la gestión de la cuenta
        expr: DISTRIBUCION
        data_type: VARCHAR(100)
        sample_values:
          - CC INTERNO
          - SUCURSALES
          - TELEGESTION
      - name: DIVISION
        synonyms:
          - División Domicilio
          - División Geográfica
        description: División geográfica en México asociada al cliente
        expr: DIVISION
        data_type: VARCHAR(30)
        sample_values:
          - NORTE
          - CENTRO SUR
      - name: ENTRE_CALLE_1
        synonyms:
          - Calle 1
        description: Nombre de la calle_1 que se utiliza como referencia geográfica para ubicar el domicilio del cliente.
        expr: ENTRE_CALLE_1
        data_type: VARCHAR(16777216)
        sample_values:
          - HDA DEL CARMEN
          - VALLE DE ZAPOPAN
      - name: ENTRE_CALLE_2
        synonyms:
          - Calle 2
        description: Nombre de la calle_2 que se utiliza como referencia geográfica para ubicar el domicilio del cliente.
        expr: ENTRE_CALLE_2
        data_type: VARCHAR(16777216)
        sample_values:
          - AVENIDA METROPLEX
          - VALLECILLO
          - AV ACUEDUCTO
      - name: ESTATUS_CUENTA
        synonyms:
          - Estado de Cuentas
        description: |
          Estatus actual de la cuenta, Activo el cliente tiene acceso a sus servicios e inactivo el cliente ya no tiene acceso a sus servicios.
        expr: ESTATUS_CUENTA
        data_type: VARCHAR(16777216)
        sample_values:
          - Inactiva
          - Cancelada
          - Activa
      - name: ESTATUS_INTERNET
        synonyms:
          - Estado Internet
        description: Estatus referente al servicio del internet, Activo el cliente tiene acceso al servicio, Inactivo el cliente tiene suspendido el servicio y NULL el cliente no tiene contratado el servicio.
        expr: ESTATUS_INTERNET
        data_type: VARCHAR(16777216)
        sample_values:
          - Activo
          - Inactivo
      - name: ESTATUS_TELEFONIA
        synonyms:
          - Estado Telefonía
        description: Estatus referente al servicio de telefonía, Activo el cliente tiene acceso al servicio, Inactivo el cliente tiene suspendido el servicio y NULL el cliente no tiene contratado el servicio.
        expr: ESTATUS_TELEFONIA
        data_type: VARCHAR(16777216)
        sample_values:
