  - name: '"Agrupa a los clientes acorde a su tipo de VIT, y Estatus Cuenta"'
    sql: |-
      SELECT
        play_cliente,
        estatus_cuenta,
        COUNT(DISTINCT cliente) AS total_clientes,
        SUM(saldo_vencido) AS total_saldo_vencido,
        SUM(saldo_por_vencer) AS total_saldo_por_vencer,
        SUM(deuda) AS total_deuda
      FROM
        sc_cartera_final_distribucion
      GROUP BY
        play_cliente,
        estatus_cuenta
      ORDER BY
        play_cliente,
        estatus_cuenta
