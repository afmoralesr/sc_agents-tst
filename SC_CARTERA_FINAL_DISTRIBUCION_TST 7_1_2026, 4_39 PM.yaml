          - 'N'
      - name: FLG_STATUS_COLLECTION
        synonyms:
          - Bandera Estatus Collection
        description: Indica el estado dentro de la etapa de gestión de cobranza. SUSPENDIDA de 0 a 18 días mora. INACTIVA de  19 a 90 días mora.
        expr: FLG_STATUS_COLLECTION
        data_type: VARCHAR(16777216)
        sample_values:
