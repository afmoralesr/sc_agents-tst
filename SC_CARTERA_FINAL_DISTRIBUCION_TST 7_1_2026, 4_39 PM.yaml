  - name: '"¿Clientes con días de mora menor 7?"'
    sql: |-
      SELECT
        cliente,
        nombre,
        dias_mora,
        saldo_vencido,
        saldo_por_vencer,
        deuda,
        metodo_pago,
        estatus_cuenta,
