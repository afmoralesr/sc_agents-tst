      - name: FLG_MOVIL
        synonyms:
          - Bandera Móvil
        description: Indica si el cliente tiene contratado IZZI Móvil "Y" = TRUE , "N"= FALSE.
        expr: FLG_MOVIL
        data_type: VARCHAR(1)
        sample_values:
